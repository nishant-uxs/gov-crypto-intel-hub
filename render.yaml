# Render blueprint for Gov-Crypto Intelligence Hub
# Repo: https://github.com/sagar-goyal162005/Gov-Crypto.git
# FREE TIER - No credit card required
# Note: Web service spins down after 15 min of inactivity (cold starts ~30s)
# Note: Free PostgreSQL expires after 90 days

services:
  - type: web
    name: gov-crypto-intel-hub-web
    env: node
    region: oregon
    branch: master
    buildCommand: |
      npm ci
      npx prisma generate
      npx prisma db push
      npx tsx prisma/seed.ts
      npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        value: https://gov-crypto-intel-hub-web.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: govcrypto-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        value: ""

databases:
  - name: govcrypto-db
    databaseName: govcrypto
    user: govcrypto
    plan: free
    region: oregon

# Notes:
# 1. DATABASE_URL is wired automatically from the Render Postgres database.
# 2. NEXTAUTH_SECRET is auto-generated by Render (generateValue: true).
# 3. Set your ANTHROPIC_API_KEY in the Render dashboard after deployment.
# 4. Cron job removed - free plan does not support cron jobs.
#    For hourly news ingestion, trigger manually via: npx tsx src/lib/ingest.ts
