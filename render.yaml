# Render blueprint for Gov-Crypto Intelligence Hub
# Repo: https://github.com/sagar-goyal162005/Gov-Crypto.git
# Import this file via Render Dashboard → New → Blueprint

services:
  - type: web
    name: gov-crypto-intel-hub-web
    env: node
    region: oregon
    branch: master
    buildCommand: |
      npm ci
      npx prisma generate
      npx prisma db push
      npx tsx prisma/seed.ts
      npm run build
    startCommand: npm run start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        value: https://gov-crypto-intel-hub-web.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: govcrypto-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        value: ""

  - type: cron
    name: news-ingest-hourly
    env: node
    region: oregon
    branch: master
    schedule: "0 * * * *" # every hour
    buildCommand: npm ci && npx prisma generate
    command: npx tsx src/lib/ingest.ts
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: govcrypto-db
          property: connectionString

databases:
  - name: govcrypto-db
    databaseName: govcrypto
    user: govcrypto
    plan: starter
    region: oregon

# Notes:
# 1. `DATABASE_URL` is wired automatically from the Render Postgres database.
# 2. `NEXTAUTH_SECRET` is auto-generated by Render (generateValue: true).
# 3. Set your `ANTHROPIC_API_KEY` in the Render dashboard after deployment.
# 4. The build process runs prisma db push and the seed script on every deploy.
#    Remove the seed step from buildCommand after initial deployment if desired.
# 5. The cron job runs the news ingestion script every hour automatically.

